name: Pylint

on:
  push:
    branches:
      - development
      - main
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pylint>=3,<4"

      - name: Run pylint
        run: pylint src/gedcomtools
